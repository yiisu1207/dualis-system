<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP System</title>
    <link rel="icon" href="/favicon.svg" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/index.css">

    <style>
        :root {
            --odoo-primary: #714B67;
            --odoo-secondary: #017E84;
            --odoo-dark: #22252B;
            --odoo-bg: #F1F5F9;
            --odoo-border: #E2E8F0;
            --font-family: 'Inter', system-ui, sans-serif;
        }
        .dark {
            --odoo-bg: #0F172A;
            --odoo-dark: #020617;
            --odoo-border: #1E293B;
        }
        body { 
            font-family: var(--font-family); 
            background: var(--odoo-bg); 
            color: #374151; 
            overflow-y: auto;
            overflow-x: hidden;
        }
        .odoo-card {
            background: white;
            border: 1px solid var(--odoo-border);
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .dark .odoo-card {
            background: #1e293b;
            border-color: #334155;
            color: #f8fafc;
        }
        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0); } }
        /* Small UI animations */
        @keyframes floatUp {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
        .animate-float { animation: floatUp 3s ease-in-out infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-text { background: linear-gradient(90deg, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.0) 100%); background-size: 200% 100%; display: inline-block; -webkit-background-clip: text; background-clip: text; animation: shimmer 2.5s linear infinite; }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--odoo-primary);
            box-shadow: 0 0 0 1px var(--odoo-primary);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
