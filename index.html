<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dualis ERP — El sistema que Venezuela necesitaba</title>
    <meta name="description" content="ERP Cloud para Venezuela. POS Detal + Mayor, inventario, CxC, CxP, RRHH, contabilidad, tasas BCV en vivo e IA. En USD y bolívares. 30 días gratis." />
    <meta property="og:title" content="Dualis ERP — El sistema que Venezuela necesitaba" />
    <meta property="og:description" content="POS, inventario, finanzas, RRHH y VisionLab IA. Multi-moneda USD/VES. Tasas BCV en vivo. Sin servidores." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface2: #eef1f8;
            --surface3: #e2e7f3;
            --border: rgba(0,0,0,0.07);
            --border2: rgba(0,0,0,0.13);
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --gold: #d97706;
            --green: #059669;
            --red: #dc2626;
            --text: #111827;
            --text2: #4b5563;
            --text3: #9ca3af;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Instrument Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }
        body { 
            font-family: var(--font-body); 
            background: var(--bg); 
            color: var(--text); 
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        /* Ambient backgrounds */
        .amb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite alternate; }
        .a1 { width: 600px; height: 400px; background: rgba(79, 110, 247, 0.06); top: -100px; right: -100px; }
        .a2 { width: 500px; height: 500px; background: rgba(124, 58, 237, 0.04); bottom: 100px; left: -150px; animation-delay: -6s; }
        .a3 { width: 300px; height: 300px; background: rgba(6, 182, 212, 0.03); top: 50%; left: 40%; animation-delay: -3s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 20px) scale(1.05); } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
        
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="amb a1"></div>
    <div class="amb a2"></div>
    <div class="amb a3"></div>
    <div id="root"></div>
    
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
