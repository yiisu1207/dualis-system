<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Erp System</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.svg" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/index.css">

    <style>
        :root {
            --odoo-primary: #0f766e;
            --odoo-secondary: #c0841f;
            --odoo-dark: #1b1b1b;
            --odoo-bg: #f6f2ec;
            --odoo-border: #e7e2d9;
            --font-display: 'Fraunces', serif;
            --font-body: 'Manrope', system-ui, sans-serif;
            --font-family: var(--font-body);
            --ui-bg: #f6f2ec;
            --ui-panel: #ffffff;
            --ui-elev: #fbf8f4;
            --ui-ink: #1b1b1b;
            --ui-muted: #6b7280;
            --ui-border: #e7e2d9;
            --ui-accent: #0f766e;
            --ui-accent-2: #c0841f;
            --ui-soft: rgba(15, 118, 110, 0.08);
        }
        .dark {
            --odoo-bg: #0f1115;
            --odoo-dark: #07090c;
            --odoo-border: #1f2329;
            --ui-bg: #0f1115;
            --ui-panel: #151922;
            --ui-elev: #1b202c;
            --ui-ink: #f4f2ee;
            --ui-muted: #9aa4b2;
            --ui-border: #242a36;
            --ui-accent: #20b2a2;
            --ui-accent-2: #e1b36a;
            --ui-soft: rgba(32, 178, 162, 0.12);
        }
        body { 
            font-family: var(--font-family); 
            background: var(--odoo-bg); 
            color: var(--ui-ink); 
            overflow-y: auto;
            overflow-x: hidden;
        }
        .odoo-card {
            background: white;
            border: 1px solid var(--odoo-border);
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .dark .odoo-card {
            background: #1e293b;
            border-color: #334155;
            color: #f8fafc;
        }
        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0); } }
        /* Small UI animations */
        @keyframes floatUp {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
        .animate-float { animation: floatUp 3s ease-in-out infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-text { background: linear-gradient(90deg, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.0) 100%); background-size: 200% 100%; display: inline-block; -webkit-background-clip: text; background-clip: text; animation: shimmer 2.5s linear infinite; }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--odoo-primary);
            box-shadow: 0 0 0 1px var(--odoo-primary);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
